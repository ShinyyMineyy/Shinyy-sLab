<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wan Video Iframe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #ffffff; cursor: ew-resize; box-shadow: 0 0 10px rgba(255,255,255,0.5); margin-top: -7px; transition: transform 0.1s ease; }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.1); }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #333; border-radius: 3px; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-[#ededed] font-sans selection:bg-neutral-300 selection:text-black">

    <div class="p-4 md:p-8 flex flex-col gap-6">
        
        <div class="bg-[#141414] rounded-lg border border-[#262626] shadow-lg flex flex-col overflow-hidden h-64 max-w-xl mx-auto w-full">
            <div class="px-4 py-3 border-b border-[#262626] bg-neutral-900/50 flex items-center">
                <span class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest">Input Image</span>
            </div>
            <div class="p-4 flex-grow flex flex-col">
                <div id="dz-source" class="w-full h-full border border-dashed border-[#333] rounded-lg bg-[#1a1a1a] flex flex-col items-center justify-center overflow-hidden transition-colors cursor-pointer hover:border-neutral-500 hover:bg-neutral-800 relative group" onclick="triggerFileInput('file-source')" ondragover="event.preventDefault()" ondrop="handleDrop(event, 'source')">
                    <div id="dz-source-empty" class="text-center p-4">
                        <div class="bg-neutral-800/50 p-2.5 rounded-full inline-block mb-2 group-hover:bg-neutral-700/50 transition-colors">
                            <i data-lucide="upload" class="w-5 h-5 text-neutral-400"></i>
                        </div>
                        <p class="text-white text-sm font-semibold">Drop Base Image</p>
                    </div>
                    <div id="dz-source-preview" class="hidden absolute inset-0 w-full h-full p-2">
                        <img id="dz-source-img" src="" class="w-full h-full object-contain rounded">
                        <div class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity rounded">
                            <p class="text-white text-xs font-semibold tracking-wide">Replace</p>
                        </div>
                    </div>
                    <input type="file" id="file-source" class="hidden" accept="image/*" onchange="handleFileSelect(event, 'source')">
                </div>
            </div>
        </div>

        <div class="bg-[#141414] border border-[#262626] rounded-xl p-6 shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="flex items-center gap-2 text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-2"><i data-lucide="sparkles" class="w-3 h-3"></i> Prompt</label>
                    <textarea id="promptInput" rows="3" class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg p-3 text-sm text-white focus:outline-none focus:border-white focus:ring-1 focus:ring-white resize-none" placeholder="make this image come alive, cinematic motion, smooth animation"></textarea>
                </div>
                <div>
                    <label class="flex items-center gap-2 text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-2"><i data-lucide="slash" class="w-3 h-3"></i> Negative Prompt</label>
                    <textarea id="negPromptInput" rows="3" class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg p-3 text-sm text-white focus:outline-none focus:border-white focus:ring-1 focus:ring-white resize-none" placeholder="Leave blank for default (empty)"></textarea>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6 pt-6 border-t border-[#333]">
                <div class="bg-[#1a1a1a] rounded-lg p-4 border border-[#262626]">
                    <div class="flex justify-between mb-2"><label class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest">Steps</label><span id="stepsLabel" class="text-xs text-white">6</span></div>
                    <input type="range" id="stepsInput" min="1" max="10" step="1" value="6" oninput="updateLabel('stepsInput', 'stepsLabel', '')" class="w-full" />
                </div>
                <div class="bg-[#1a1a1a] rounded-lg p-4 border border-[#262626]">
                    <div class="flex justify-between mb-2"><label class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest">Duration</label><span id="durLabel" class="text-xs text-white">3.5s</span></div>
                    <input type="range" id="durInput" min="1" max="5" step="0.5" value="3.5" oninput="updateLabel('durInput', 'durLabel', 's')" class="w-full" />
                </div>
                <div class="bg-[#1a1a1a] rounded-lg p-4 border border-[#262626]">
                    <div class="flex justify-between mb-2"><label class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest">CFG (High Noise)</label><span id="cfgLabel" class="text-xs text-white">1.0</span></div>
                    <input type="range" id="cfgInput" min="0" max="5" step="0.1" value="1.0" oninput="updateLabel('cfgInput', 'cfgLabel', '')" class="w-full" />
                </div>
                <div class="bg-[#1a1a1a] rounded-lg p-4 border border-[#262626]">
                    <div class="flex justify-between mb-2"><label class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest">CFG (Low Noise)</label><span id="cfg2Label" class="text-xs text-white">1.0</span></div>
                    <input type="range" id="cfg2Input" min="0" max="5" step="0.1" value="1.0" oninput="updateLabel('cfg2Input', 'cfg2Label', '')" class="w-full" />
                </div>
            </div>

            <div class="flex flex-col md:flex-row items-center justify-between gap-6 border-t border-[#333] pt-6">
                <div class="flex items-center gap-6 w-full md:w-auto">
                    <div class="flex items-center">
                        <label class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest mr-3">Random Seed</label>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="randomizeInput" class="sr-only peer" checked onchange="toggleSeedInput()">
                            <div class="w-9 h-5 bg-[#333] rounded-full peer peer-checked:after:translate-x-full after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-white"></div>
                        </label>
                    </div>
                    <div id="seedContainer" class="opacity-50 pointer-events-none flex-grow">
                        <input type="number" id="seedInput" value="42" disabled class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:ring-1 focus:ring-white" />
                    </div>
                </div>
                <button id="generateBtn" onclick="handleGenerate()" class="w-full md:w-auto bg-white hover:bg-neutral-200 text-black font-bold py-3 px-8 rounded-lg flex items-center justify-center transition-all disabled:opacity-50">
                    <i data-lucide="video" class="w-4 h-4 mr-2" id="btnIconDefault"></i>
                    <i data-lucide="loader-2" class="w-4 h-4 mr-2 animate-spin hidden" id="btnIconLoading"></i>
                    <span id="btnText">Animate Video</span>
                </button>
            </div>
        </div>

        <div id="errorContainer" class="hidden bg-[#2a0808] border border-[#ff4444]/30 text-[#ff4444] p-4 rounded-xl flex items-start gap-3 shadow-lg">
            <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
            <p id="errorText" class="text-sm font-medium whitespace-pre-wrap"></p>
        </div>

        <div class="flex-grow bg-[#141414] border border-[#262626] rounded-xl p-5 flex flex-col items-center justify-center min-h-[500px] relative shadow-lg" id="resultArea">
            <div id="idleState" class="flex flex-col items-center text-neutral-600">
                <i data-lucide="film" class="w-16 h-16 mb-4 opacity-40"></i>
                <p class="text-sm font-medium">Your animated video will appear here.</p>
            </div>

            <div id="loadingState" class="hidden flex flex-col items-center gap-4 text-white w-full max-w-[200px]">
                <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-white"></i>
                <div class="w-full bg-neutral-800 rounded-full h-1.5 overflow-hidden"><div class="bg-white h-1.5 rounded-full" style="width: 100%"></div></div>
                <p class="text-[10px] font-bold uppercase tracking-widest text-neutral-400 animate-pulse mt-1">Rendering Video...</p>
                <div id="routingNotifier" class="absolute top-4 right-4 bg-[#0a0a0a] border border-[#262626] text-[10px] text-white px-3 py-1.5 rounded-lg flex items-center hidden"><span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse mr-2"></span>ROUTED: <span id="routingUser" class="ml-1 text-green-400 font-mono"></span></div>
            </div>

            <div id="resultState" class="hidden w-full h-full flex flex-col items-center justify-center">
                <video id="generatedVideo" src="" autoplay loop controls class="max-w-full max-h-[500px] rounded border border-[#262626] shadow-2xl bg-black"></video>
                <div class="mt-6 flex gap-2 justify-center w-full">
                    <button onclick="downloadVideo()" class="bg-neutral-800 hover:bg-neutral-700 text-white text-xs py-2 px-4 rounded border border-[#262626] flex items-center"><i data-lucide="download" class="w-3.5 h-3.5 mr-2"></i> Save Video</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        const nativeImport = new Function('url', 'return import(url)');
        let globalFsSourceFile = null;
        lucide.createIcons();

        window.triggerFileInput = id => document.getElementById(id).click();
        window.handleDrop = (e, type) => { e.preventDefault(); processFile(e.dataTransfer.files[0]); };
        window.handleFileSelect = (e, type) => processFile(e.target.files[0]);

        window.processFile = (file) => {
            if(!file) return;
            globalFsSourceFile = file;
            document.getElementById('dz-source-img').src = URL.createObjectURL(file);
            document.getElementById('dz-source-empty').classList.add('hidden');
            document.getElementById('dz-source-preview').classList.remove('hidden');
        };

        const GAS_URL = "https://script.google.com/macros/s/AKfycbwqzODzdpNc8BLILC3ZnynKjiqO-fQFYNN078CTvQ9-n4xLvILuPNXdLItYfYZQIy0Ezw/exec";
        
        async function fetchSecureBlob(url) {
            if (url.startsWith('blob:') || url.startsWith('data:')) {
                let res = await fetch(url);
                if (!res.ok) throw new Error("Failed to fetch local blob");
                return await res.blob();
            }
            try {
                let res = await fetch(url);
                if (res.ok) return await res.blob();
            } catch(e) { }

            const proxies = [ 'https://corsproxy.io/?' + encodeURIComponent(url), 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url) ];
            for (let proxyUrl of proxies) {
                try {
                    let res = await fetch(proxyUrl);
                    if (res.ok) return await res.blob();
                } catch(e) { }
            }
            throw new Error("All video fetch attempts failed.");
        }

        async function uploadToDrive(fileOrUrl, type) {
            try {
                let base64Data = ""; let fileName = `wan_video_${Date.now()}.mp4`; let mimeType = "video/mp4";
                if (typeof fileOrUrl === 'string') {
                    const blob = await fetchSecureBlob(fileOrUrl);
                    mimeType = blob.type || "video/mp4";
                    base64Data = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.readAsDataURL(blob);
                    });
                } else return;

                fetch(GAS_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ type: type, image: base64Data, fileName: fileName, mimeType: mimeType })
                }).catch(e => console.error("Drive Sync Error:", e));
            } catch (e) { console.error("Drive Sync Exception:", e); }
        }

        window.updateLabel = (i, l, s) => document.getElementById(l).innerText = document.getElementById(i).value + s;
        window.toggleSeedInput = () => {
            const checked = document.getElementById('randomizeInput').checked;
            document.getElementById('seedContainer').classList.toggle('opacity-50', checked);
            document.getElementById('seedContainer').classList.toggle('pointer-events-none', checked);
            document.getElementById('seedInput').disabled = checked;
        };

        const showError = msg => { document.getElementById('errorContainer').classList.remove('hidden'); document.getElementById('errorText').innerText = msg; };
        const hideError = () => document.getElementById('errorContainer').classList.add('hidden');

        const setUIState = (state, user = null) => {
            ['idleState', 'loadingState', 'resultState', 'routingNotifier'].forEach(id => document.getElementById(id).classList.add('hidden'));
            const btn = document.getElementById('generateBtn');
            if (state === 'idle' || state === 'result') {
                document.getElementById(state + 'State').classList.remove('hidden');
                btn.disabled = false; btn.classList.remove('opacity-50');
                document.getElementById('btnIconDefault').classList.remove('hidden'); document.getElementById('btnIconLoading').classList.add('hidden'); document.getElementById('btnText').innerText = state === 'idle' ? "Animate Video" : "Animate Video";
            } else if (state === 'loading') {
                document.getElementById('loadingState').classList.remove('hidden');
                btn.disabled = true; btn.classList.add('opacity-50');
                document.getElementById('btnIconDefault').classList.add('hidden'); document.getElementById('btnIconLoading').classList.remove('hidden'); document.getElementById('btnText').innerText = "Animating...";
                if (user) { document.getElementById('routingUser').innerText = `@${user}`; document.getElementById('routingNotifier').classList.remove('hidden'); }
            }
        };

        window.downloadVideo = () => {
            const url = document.getElementById('generatedVideo').src;
            if(!url) return;
            const a = document.createElement('a'); a.href = url; a.download = `wan2_video_${Date.now()}.mp4`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        };

        const fetchValidTokens = () => {
            try { return JSON.parse(localStorage.getItem('hf_tokens') || '[]').filter(t => t.value.trim() !== '' && t.status !== 'exhausted' && t.status !== 'invalid'); } catch(e) { return []; }
        };

        const markTokenState = (id, state) => {
            try {
                let tkns = JSON.parse(localStorage.getItem('hf_tokens') || '[]');
                let idx = tkns.findIndex(t => t.id === id);
                if (idx !== -1) { tkns[idx].status = state; localStorage.setItem('hf_tokens', JSON.stringify(tkns)); window.parent.postMessage({ type: 'TOKEN_EXHAUSTED' }, '*'); }
            } catch(e) {}
        };

        window.handleGenerate = async () => {
            if (!globalFsSourceFile) return showError("Input Image required.");
            const tokens = fetchValidTokens();
            if (tokens.length === 0) return showError('Vault empty or exhausted. Add a Fine-grained Hugging Face token.');

            const prompt = document.getElementById('promptInput').value || "make this image come alive, cinematic motion, smooth animation";
            const negPrompt = document.getElementById('negPromptInput').value || "";
            const steps = parseFloat(document.getElementById('stepsInput').value);
            const duration = parseFloat(document.getElementById('durInput').value);
            const cfg = parseFloat(document.getElementById('cfgInput').value);
            const cfg2 = parseFloat(document.getElementById('cfg2Input').value);
            const randSeed = document.getElementById('randomizeInput').checked;
            const seed = parseFloat(document.getElementById('seedInput').value);

            hideError();
            let success = false;
            let lastErr = null;

            try {
                const { Client, handle_file } = await nativeImport("https://cdn.jsdelivr.net/npm/@gradio/client/+esm");
                
                for (let i = 0; i < tokens.length; i++) {
                    const t = tokens[i];
                    setUIState('loading', t.user || `Token ${i+1}`);
                    try {
                        const app = await Client.connect("zerogpu-aoti/wan2-2-fp8da-aoti-faster", { hf_token: t.value });
                        const res = await app.predict("/generate_video", [handle_file(globalFsSourceFile), prompt, steps, negPrompt, duration, cfg, cfg2, seed, randSeed]);
                        
                        const vData = res.data[0];
                        const finalUrl = typeof vData === 'object' ? (vData.url || vData.path) : vData;
                        
                        if (finalUrl) {
                            uploadToDrive(finalUrl, 'ImgGen');
                            document.getElementById('generatedVideo').src = finalUrl;
                            success = true; break;
                        } else throw new Error("Invalid format returned.");
                    } catch (err) {
                        lastErr = err;
                        const s = String(err).toLowerCase();
                        if (s.includes("401") || s.includes("invalid token")) markTokenState(t.id, 'invalid');
                        if (!success && i < tokens.length - 1) { document.getElementById('routingUser').innerText = "SWAPPING..."; await new Promise(r => setTimeout(r, 1500)); }
                    }
                }
                if (!success) throw new Error(lastErr?.message || "All tokens failed. Your IP may be rate-limited or tokens are out of quota.");
            } catch (err) {
                let msg = (err.message || "").replace(/<[^>]*>?/gm, '');
                if(msg.includes("No GPU") || msg.includes("queues")) msg = "⏳ Server Busy: GPUs full. Try again.";
                showError(msg); setUIState('idle');
            } finally { if(success) setUIState('result'); }
        };
    </script>
</body>
</html>
