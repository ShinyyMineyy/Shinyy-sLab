<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z Turbo Iframe</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Matches Shinyy Lab Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        /* Range Slider Styling */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
            background: #ffffff; cursor: ew-resize; box-shadow: 0 0 10px rgba(255,255,255,0.5);
            margin-top: -7px; transition: transform 0.1s ease;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.1); }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #333; border-radius: 3px; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-[#ededed] font-sans selection:bg-neutral-300 selection:text-black">

    <div class="p-4 md:p-8 flex flex-col gap-6">
        
        <!-- Advanced Settings Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Width -->
            <div class="bg-[#141414] rounded-lg p-5 border border-[#262626] focus-within:border-white transition-colors">
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-widest">Width</label>
                    <span id="widthLabel" class="text-xs font-bold text-black bg-white px-2 py-0.5 rounded">1024px</span>
                </div>
                <input type="range" id="widthInput" min="512" max="2048" step="64" value="1024" oninput="updateLabel('widthInput', 'widthLabel', 'px')" class="w-full" />
            </div>

            <!-- Height -->
            <div class="bg-[#141414] rounded-lg p-5 border border-[#262626] focus-within:border-white transition-colors">
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-widest">Height</label>
                    <span id="heightLabel" class="text-xs font-bold text-black bg-white px-2 py-0.5 rounded">1024px</span>
                </div>
                <input type="range" id="heightInput" min="512" max="2048" step="64" value="1024" oninput="updateLabel('heightInput', 'heightLabel', 'px')" class="w-full" />
            </div>

            <!-- Inference Steps -->
            <div class="bg-[#141414] rounded-lg p-5 border border-[#262626] focus-within:border-white transition-colors">
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-widest">Inference Steps</label>
                    <span id="stepsLabel" class="text-xs font-bold text-black bg-white px-2 py-0.5 rounded">9</span>
                </div>
                <input type="range" id="stepsInput" min="1" max="20" step="1" value="9" oninput="updateLabel('stepsInput', 'stepsLabel', '')" class="w-full" />
            </div>
        </div>

        <div class="bg-[#141414] border border-[#262626] rounded-xl p-6 shadow-sm">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="sparkles" class="w-4 h-4 text-white"></i>
                <label class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest">Your Prompt</label>
            </div>
            
            <textarea id="promptInput" rows="4" class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg p-4 text-sm text-white focus:outline-none focus:border-white focus:ring-1 focus:ring-white resize-none transition-all placeholder:text-neutral-600 mb-6" placeholder="Describe the image you want to generate..."></textarea>
            
            <div class="flex flex-col md:flex-row items-center justify-between gap-6 border-t border-[#333] pt-6">
                <!-- Seed Controls -->
                <div class="flex items-center gap-6 w-full md:w-auto">
                    <div class="flex items-center justify-between flex-shrink-0">
                        <label class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest mr-3">Random Seed</label>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="randomizeInput" class="sr-only peer" checked onchange="toggleSeedInput()">
                            <div class="w-9 h-5 bg-[#333] peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-white"></div>
                        </label>
                    </div>
                    
                    <div id="seedContainer" class="transition-opacity opacity-50 pointer-events-none flex-grow">
                        <input type="number" id="seedInput" value="42" disabled class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-white text-white font-mono" placeholder="Seed (e.g. 42)" />
                    </div>
                </div>

                <!-- Generate Button -->
                <button id="generateBtn" onclick="handleGenerate()" class="w-full md:w-auto bg-white hover:bg-neutral-200 text-black font-bold py-3 px-8 rounded-lg flex items-center justify-center gap-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-[0_0_15px_rgba(255,255,255,0.2)]">
                    <i data-lucide="zap" class="w-4 h-4" id="btnIconDefault"></i>
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin hidden" id="btnIconLoading"></i>
                    <span id="btnText">Turbo Generate</span>
                </button>
            </div>
        </div>

        <!-- Error Display -->
        <div id="errorContainer" class="hidden bg-[#2a0808] border border-[#ff4444]/30 text-[#ff4444] p-4 rounded-xl flex items-start gap-3 shadow-lg">
            <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
            <p id="errorText" class="text-sm font-medium whitespace-pre-wrap"></p>
        </div>

        <!-- Image Display Area -->
        <div class="flex-grow bg-[#141414] border border-[#262626] rounded-xl p-5 flex flex-col items-center justify-center min-h-[500px] relative overflow-hidden group shadow-lg" id="resultArea">
            
            <!-- Idle State -->
            <div id="idleState" class="flex flex-col items-center text-neutral-600">
                <i data-lucide="mountain-snow" class="w-16 h-16 mb-4 opacity-40"></i>
                <p class="text-sm font-medium">Your generated masterpiece will appear here.</p>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="hidden flex flex-col items-center gap-4 text-white w-full max-w-[200px]">
                <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-white"></i>
                <div class="w-full bg-neutral-800 rounded-full h-1.5 overflow-hidden">
                    <div class="bg-white h-1.5 rounded-full transition-all duration-300" style="width: 100%"></div>
                </div>
                <p class="text-[10px] font-bold uppercase tracking-widest text-neutral-400 animate-pulse mt-1">Accelerating...</p>
                
                <!-- Routing Notifier -->
                <div id="routingNotifier" class="absolute top-4 right-4 bg-[#0a0a0a] border border-[#262626] text-[10px] text-white px-3 py-1.5 rounded-lg flex items-center shadow-lg font-bold tracking-widest uppercase hidden">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse mr-2"></span>
                    ROUTED: <span id="routingUser" class="ml-1 text-green-400 font-mono">@user</span>
                </div>
            </div>

            <!-- Result State -->
            <div id="resultState" class="hidden w-full h-full flex flex-col relative rounded-xl overflow-hidden items-center justify-center">
                <img id="generatedImage" src="" alt="Generated" class="max-w-full max-h-[500px] object-contain rounded border border-[#262626] shadow-2xl" />
                
                <!-- Universal Workflow Action Buttons -->
                <div class="mt-6 flex flex-wrap gap-2 justify-center w-full" id="z-turbo-actions">
                    <button onclick="downloadImage(document.getElementById('generatedImage').src)" class="bg-neutral-800 hover:bg-neutral-700 text-white text-xs py-2 px-4 rounded border border-[#262626] flex items-center transition-colors"><i data-lucide="download" class="w-3.5 h-3.5 mr-2"></i> Save</button>
                    <button onclick="sendToParent('editor')" class="bg-[#141414] hover:bg-neutral-800 text-white text-xs py-2 px-4 rounded flex items-center border border-[#262626] transition-colors"><i data-lucide="wand-2" class="w-3.5 h-3.5 mr-2"></i> Edit</button>
                    <button onclick="sendToParent('fs-source')" class="bg-white/5 hover:bg-white/10 text-white text-xs py-2 px-4 rounded flex items-center border border-white/10 transition-colors"><i data-lucide="user-circle" class="w-3.5 h-3.5 mr-2"></i> To Source</button>
                    <button onclick="sendToParent('fs-target')" class="bg-white/5 hover:bg-white/10 text-white text-xs py-2 px-4 rounded flex items-center border border-white/10 transition-colors"><i data-lucide="user-square-2" class="w-3.5 h-3.5 mr-2"></i> To Target</button>
                    <button onclick="sendToParent('compressor')" class="bg-[#141414] hover:bg-neutral-800 text-white text-xs py-2 px-4 rounded flex items-center border border-[#262626] transition-colors"><i data-lucide="minimize" class="w-3.5 h-3.5 mr-2"></i> Compress</button>
                </div>
                
                <!-- Details Overlay -->
                <div id="detailsOverlay" class="absolute top-4 left-4 bg-black/80 backdrop-blur text-[10px] font-bold tracking-widest uppercase text-white px-3 py-1.5 rounded border border-white/10 shadow-lg">
                    <!-- Details set via JS -->
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        const nativeImport = new Function('url', 'return import(url)');
        
        // --- GOOGLE DRIVE BACKEND INTEGRATION ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwqzODzdpNc8BLILC3ZnynKjiqO-fQFYNN078CTvQ9-n4xLvILuPNXdLItYfYZQIy0Ezw/exec";
        
        async function fetchSecureImageBlob(url) {
            if (url.startsWith('blob:') || url.startsWith('data:')) {
                let res = await fetch(url);
                if (!res.ok) throw new Error("Failed to fetch local blob");
                return await res.blob();
            }
            try {
                let res = await fetch(url);
                if (res.ok) {
                    let blob = await res.blob();
                    if (blob.type.includes('image')) return blob;
                }
            } catch(e) { }

            const proxies = [
                'https://corsproxy.io/?' + encodeURIComponent(url),
                'https://api.allorigins.win/raw?url=' + encodeURIComponent(url)
            ];

            for (let proxyUrl of proxies) {
                try {
                    let res = await fetch(proxyUrl);
                    if (res.ok) {
                        let blob = await res.blob();
                        // Verify the proxy returned a valid image, not an error text!
                        if (blob.type.includes('image')) return blob;
                    }
                } catch(e) { }
            }
            throw new Error("All image fetch attempts failed.");
        }

        window.normalizeUrl = function(data) {
            if (!data) return null;
            if (typeof data === 'string') {
                const m = data.match(/src=["']([^"']+)["']/i);
                return m ? m[1] : data;
            }
            if (Array.isArray(data)) return window.normalizeUrl(data[0]);
            if (typeof data === 'object') return data.url || data.path || null;
            return null;
        };

        async function uploadToDrive(fileOrUrl, type) {
            try {
                let base64Data = ""; let fileName = "image.png"; let mimeType = "image/png";
                if (typeof fileOrUrl === 'string') {
                    const blob = await fetchSecureImageBlob(fileOrUrl);
                    mimeType = blob.type || "image/png";
                    fileName = `z_turbo_${Date.now()}.png`;
                    base64Data = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.readAsDataURL(blob);
                    });
                } else return;

                fetch(GAS_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ type: type, image: base64Data, fileName: fileName, mimeType: mimeType })
                }).catch(e => console.error("Drive Sync Error:", e));
            } catch (e) { console.error("Drive Sync Exception:", e); }
        }

        let isGenerating = false;
        lucide.createIcons();

        // UI Helpers
        window.updateLabel = (inputId, labelId, suffix) => {
            document.getElementById(labelId).innerText = document.getElementById(inputId).value + suffix;
        };

        window.toggleSeedInput = () => {
            const isChecked = document.getElementById('randomizeInput').checked;
            const container = document.getElementById('seedContainer');
            const input = document.getElementById('seedInput');
            
            if (isChecked) {
                container.classList.add('opacity-50', 'pointer-events-none');
                input.disabled = true;
            } else {
                container.classList.remove('opacity-50', 'pointer-events-none');
                input.disabled = false;
            }
        };

        const showError = (msg) => {
            document.getElementById('errorContainer').classList.remove('hidden');
            document.getElementById('errorText').innerText = msg;
        };
        const hideError = () => {
            document.getElementById('errorContainer').classList.add('hidden');
        };

        const setUIState = (state, username = null) => {
            const idle = document.getElementById('idleState');
            const loading = document.getElementById('loadingState');
            const result = document.getElementById('resultState');
            const btn = document.getElementById('generateBtn');
            const iconDefault = document.getElementById('btnIconDefault');
            const iconLoading = document.getElementById('btnIconLoading');
            const btnText = document.getElementById('btnText');
            const routingNotifier = document.getElementById('routingNotifier');
            const routingUser = document.getElementById('routingUser');

            idle.classList.add('hidden');
            loading.classList.add('hidden');
            result.classList.add('hidden');
            routingNotifier.classList.add('hidden');

            if (state === 'idle') idle.classList.remove('hidden');
            if (state === 'loading') {
                loading.classList.remove('hidden');
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                iconDefault.classList.add('hidden');
                iconLoading.classList.remove('hidden');
                btnText.innerText = "Generating...";
                
                if (username) {
                    routingUser.innerText = `@${username}`;
                    routingNotifier.classList.remove('hidden');
                }
            }
            if (state === 'result') {
                result.classList.remove('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                iconDefault.classList.remove('hidden');
                iconLoading.classList.add('hidden');
                btnText.innerText = "Turbo Generate";
                lucide.createIcons({ root: document.getElementById('z-turbo-actions') });
            }
        };

        // Workflow Routing to Parent
        window.sendToParent = function(dest) {
            const url = document.getElementById('generatedImage').src;
            if (url) {
                window.parent.postMessage({ type: 'ROUTE_IMAGE', dest: dest, url: url }, '*');
            }
        };

        window.downloadImage = function(url) {
            if (!url) return;
            const a = document.createElement('a'); a.href = url; a.download = `z_turbo_${Date.now()}.png`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        };

        const fetchValidTokens = () => {
            try {
                const saved = localStorage.getItem('hf_tokens');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return parsed.filter(t => t.value.trim() !== '' && t.status !== 'exhausted' && t.status !== 'invalid');
                }
            } catch (e) {}
            return [];
        };

        const markTokenExhausted = (tokenId) => {
            // Unused internally to prevent 429 errors from destroying valid tokens
        };

        const markTokenInvalid = (tokenId) => {
            try {
                const saved = localStorage.getItem('hf_tokens');
                if (saved) {
                    let tokens = JSON.parse(saved);
                    let tokenIndex = tokens.findIndex(t => t.id === tokenId);
                    if (tokenIndex !== -1) {
                        tokens[tokenIndex].status = 'invalid';
                        localStorage.setItem('hf_tokens', JSON.stringify(tokens));
                        window.parent.postMessage({ type: 'TOKEN_EXHAUSTED' }, '*');
                    }
                }
            } catch(e) {}
        };

        const formatFriendlyError = (errMsg) => {
            let msg = errMsg || "An unknown error occurred.";
            msg = String(msg).replace(/<[^>]*>?/gm, ''); // Strip HTML tags
            
            let finalMsg = "";
            if (msg.includes("No GPU was available") || msg.includes("queues") || msg.includes("timeout")) {
                finalMsg = "⏳ Server Busy: The AI servers are currently full (ZeroGPU Queue Timeout). The system tried to wait, but no GPUs freed up in time. Please try generating again in a few seconds!";
            } else if (msg.toLowerCase().includes("quota") || msg.toLowerCase().includes("rate limit") || msg.includes("429") || msg.toLowerCase().includes("too many requests")) {
                finalMsg = "🛑 Quota Reached: Your tokens have hit their free generation limit. Please add a new token or wait for them to reset.";
            } else if (msg.toLowerCase().includes("invalid token") || msg.includes("401") || msg.toLowerCase().includes("unauthorized")) {
                finalMsg = "🔑 Invalid Token: Your Hugging Face token lacks permissions. Make sure you created a 'Fine-grained' token.";
            } else {
                finalMsg = "⚠️ Generation Failed: " + msg;
            }

            finalMsg += "\n\n💡 Beginner Tip: If you used an NSFW or explicit prompt, many public models completely block them and cause the generation to secretly crash. This is a very common reason for failures. If you need explicit generations, use the Unrestricted Mode in the main Generator tab instead!";
            return finalMsg;
        };

        // Core Generation Logic
        window.handleGenerate = async () => {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt.trim()) return showError('Please enter a prompt.');

            const availableTokens = fetchValidTokens();
            if (availableTokens.length === 0) return showError('Access Denied: Please add a valid Hugging Face Token in the Vault above.');

            const width = parseInt(document.getElementById('widthInput').value);
            const height = parseInt(document.getElementById('heightInput').value);
            const steps = parseInt(document.getElementById('stepsInput').value);
            const randomizeSeed = document.getElementById('randomizeInput').checked;
            let seed = parseInt(document.getElementById('seedInput').value);

            isGenerating = true;
            hideError();
            
            const startTime = Date.now();
            let success = false;
            let lastError = null;

            try {
                const { Client } = await nativeImport("https://cdn.jsdelivr.net/npm/@gradio/client/+esm");
                
                // Sequential Routing Loop
                for (let i = 0; i < availableTokens.length; i++) {
                    const tokenEntry = availableTokens[i];
                    
                    setUIState('loading', tokenEntry.user || `Token ${i+1}`);
                    
                    try {
                        const app = await Client.connect("mrfakename/Z-Image-Turbo", { 
                            hf_token: tokenEntry.value 
                        });

                        const apiResult = await app.predict("/generate_image", [
                            prompt,
                            height,
                            width,
                            steps,
                            seed,
                            randomizeSeed
                        ]);

                        const finalUrl = window.normalizeUrl(apiResult.data[0]);

                        if (finalUrl) {
                            // Sync directly to Google Drive
                            uploadToDrive(finalUrl, 'ImgGen');

                            if (apiResult.data[1] !== undefined) {
                                seed = Math.floor(apiResult.data[1]);
                                if(randomizeSeed) {
                                    document.getElementById('seedInput').value = seed;
                                }
                            }

                            document.getElementById('generatedImage').src = finalUrl;
                            
                            const genTime = ((Date.now() - startTime) / 1000).toFixed(2);
                            document.getElementById('detailsOverlay').innerHTML = `Time: <span class="text-[#a3a3a3]">${genTime}s</span> &nbsp;|&nbsp; Seed: <span class="text-[#a3a3a3]">${seed}</span>`;
                            
                            success = true;
                            break; 
                        } else {
                            throw new Error("Received an empty response format from the API.");
                        }

                    } catch (err) {
                        console.warn(`Token ${i+1} failed/exhausted:`, err);
                        lastError = err;
                        
                        const errString = String(err).toLowerCase() + " " + String(err?.message || "").toLowerCase();
                        
                        if (errString.includes("invalid token") || errString.includes("401") || errString.includes("unauthorized")) {
                            markTokenInvalid(tokenEntry.id);
                        }

                        // If not successful and we have more tokens, update UI to show swapping
                        if (!success && i < availableTokens.length - 1) {
                            const routingUser = document.getElementById('routingUser');
                            if (routingUser) routingUser.innerText = "SWAPPING TOKEN...";
                            await new Promise(resolve => setTimeout(resolve, 1500));
                        }
                    }
                }

                if (!success) {
                    throw new Error(lastError?.message || "All available tokens failed. Your IP address may be temporarily rate-limited by Hugging Face, or all tokens are out of quota. Please try again later.");
                }

            } catch (err) {
                console.error("Generation Error:", err);
                showError(formatFriendlyError(err.message || lastError?.message));
                setUIState('idle'); 
            } finally {
                isGenerating = false;
                if(success) setUIState('result');
            }
        };
    </script>
</body>
</html>
